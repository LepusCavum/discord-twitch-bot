name: Issue Tracking Automation

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - synchronize #Temporary addition for testing purposes, remove later

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  move-issue-to-review:
    runs-on: ubuntu-latest

    steps:
      - name: Verify GitHub CLI
        run: gh --version
      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Using GH_PAT for GitHub CLI authentication"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract issue number from branch name
        id: extract_issue_number
        run: |
          BRANCH_NAME="${{ github.head_ref }}" 
          
          if [[ "$BRANCH_NAME" =~ ^feat/v[0-9]+\.[0-9]+\.([0-9]+)- ]]; then
              ISSUE_NUMBER="${BASH_REMATCH[1]}"
          else
              echo "No issue number found in branch name: $BRANCH_NAME"
              exit 1
          fi

          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
      - name: Get issue ID
        id: issue_id
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ISSUE_ID=$(gh issue view ${{ steps.extract_issue_number.outputs.issue_number }} --repo "$GH_REPO" --json id --jq '.id')
          echo "issue_id=$ISSUE_ID" >> $GITHUB_OUTPUT
      - name: Find project item ID
        id: project_item_id
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          ISSUE_ID: ${{ steps.extract_issue_number.outputs.issue_number }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Debug: project_id=$PROJECT_ID"
          echo "Debug: issue_number=$ISSUE_ID"

          PROJECT_DATA=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content {                        
                        ... on Issue {
                          id
                          number
                          title
                        }
                      }
                    }
                  }
                }
              }
            }' -f projectId="$PROJECT_ID" \
            --jq ".data.node.items.nodes[]")

          echo "Debug: raw project payload"
          echo "$PROJECT_DATA"

          echo "Debug: content of nodes"
          echo "$PROJECT_DATA" | jq '.content.number'

          ITEM_ID=$(echo "$PROJECT_DATA" | jq -r "select(.content.number == \"$ISSUE_ID\") | .id")

          if [[ -z "$ITEM_ID" ]]; then
            echo "No project item found for issue #${{ steps.extract_issue_number.outputs.issue_number }}"
            exit 1
          fi

          echo "item_id=$ITEM_ID" >> $GITHUB_OUTPUT
      - name: Move issue to Code Review column
        env:
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          STATUS_FIELD_ID: ${{ vars.STATUS_FIELD_ID }}
          STATUS_CODE_REVIEW_ID: ${{ vars.STATUS_CODE_REVIEW_ID }}
          ITEM_ID: ${{ steps.project_item_id.outputs.item_id }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Moving issue #${{ steps.extract_issue_number.outputs.issue_number }} to Code Review column..."
          gh project item-edit \
            --project "$PROJECT_ID" \
            --item-id "$ITEM_ID" \
            --field "$STATUS_FIELD_ID" \
            --single-select-option-id "$STATUS_CODE_REVIEW_ID"
